aid: vks-integrations
name: VKS Integrations
description: >-
  VKS (Visual Knowledge Share) provides work instruction software for
  manufacturing with a JSON REST API for pulling guidebook and production
  information and managing work orders and operations. VKS integrates with
  ERP, MES, QMS, and LMS platforms to enable bi-directional data exchange,
  real-time quality tracking, and automated work order management across
  the manufacturing floor.
type: Index
position: Consumer
access: 3rd-Party
image: https://vksapp.com/hubfs/vks-logo.png
tags:
  - ERP Integration
  - Manufacturing
  - MES
  - Operations Management
  - Quality Management
  - Work Instructions
  - Work Orders
created: '2025-03-01'
modified: '2026-05-03'
url: >-
  https://raw.githubusercontent.com/api-evangelist/vks-integrations/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: vks-integrations:vks-api
    name: VKS API
    description: >-
      The VKS JSON REST API provides programmatic access to pull guidebook
      and production information out of VKS and manage Work Orders and
      operations. It supports integration with ERP, MES, and other
      manufacturing enterprise systems. The API supports up to 50 queries
      per minute for SaaS customers.
    humanURL: https://vksapp.com/integrations
    tags:
      - ERP Integration
