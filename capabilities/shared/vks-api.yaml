naftiko: "1.0.0-alpha1"

info:
  label: "VKS API"
  description: >-
    Shared API definition for the VKS (Visual Knowledge Share) JSON REST API.
    Provides access to work orders, guidebooks, operations, and production
    data for manufacturing floor integration with ERP, MES, and QMS systems.
  tags:
    - VKS
    - Manufacturing
    - Work Orders
    - Guidebooks
    - Production Data
    - MES
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VKS_API_KEY: VKS_API_KEY
      VKS_BASE_URL: VKS_BASE_URL

capability:
  consumes:
    - type: http
      namespace: vks
      baseUri: https://api.vksapp.com
      description: "VKS manufacturing work instruction and work order API."
      authentication:
        type: bearer
        token: "{{VKS_API_KEY}}"
      resources:
        - name: work-orders
          path: /api/workorders
          description: "Work order management."
          operations:
            - name: list-work-orders
              method: GET
              description: "List all work orders with optional status and date filtering."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status: planned, in_progress, completed, on_hold"
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: per_page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-work-order
              method: POST
              description: "Create a new work order from ERP/MES."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  work_order_number: "{{tools.work_order_number}}"
                  guidebook_id: "{{tools.guidebook_id}}"
                  part_number: "{{tools.part_number}}"
                  expected_quantity: "{{tools.expected_quantity}}"

        - name: work-order-detail
          path: /api/workorders/{work_order_id}
          description: "Individual work order."
          operations:
            - name: get-work-order
              method: GET
              description: "Get full work order details."
              inputParameters:
                - name: work_order_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-work-order
              method: PUT
              description: "Update work order status or assignment."
              inputParameters:
                - name: work_order_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  assigned_worker: "{{tools.assigned_worker}}"

        - name: guidebooks
          path: /api/guidebooks
          description: "Work instruction guidebook library."
          operations:
            - name: list-guidebooks
              method: GET
              description: "List all published guidebooks."
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: guidebook-detail
          path: /api/guidebooks/{guidebook_id}
          description: "Individual guidebook."
          operations:
            - name: get-guidebook
              method: GET
              description: "Get a guidebook with steps and smart forms."
              inputParameters:
                - name: guidebook_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: work-order-operations
          path: /api/workorders/{work_order_id}/operations
          description: "Operations for a work order."
          operations:
            - name: list-work-order-operations
              method: GET
              description: "List operational steps and their status for a work order."
              inputParameters:
                - name: work_order_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: production-data
          path: /api/production-data
          description: "Production data records."
          operations:
            - name: list-production-data
              method: GET
              description: "Retrieve production data including smart forms, quality metrics, and traceability."
              inputParameters:
                - name: work_order_id
                  in: query
                  type: string
                  required: false
                - name: from_date
                  in: query
                  type: string
                  required: false
                - name: to_date
                  in: query
                  type: string
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vks-rest
      resources:
        - path: /v1/work-orders
          name: work-orders
          operations:
            - method: GET
              name: list-work-orders
              description: "List work orders."
              call: "vks.list-work-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-work-order
              description: "Create work order."
              call: "vks.create-work-order"
              with:
                work_order_number: "rest.work_order_number"
                guidebook_id: "rest.guidebook_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/guidebooks
          name: guidebooks
          operations:
            - method: GET
              name: list-guidebooks
              description: "List guidebooks."
              call: "vks.list-guidebooks"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/production-data
          name: production-data
          operations:
            - method: GET
              name: list-production-data
              description: "List production data."
              call: "vks.list-production-data"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: vks-mcp
      transport: http
      tools:
        - name: list-work-orders
          description: "List manufacturing work orders."
          hints:
            readOnly: true
            idempotent: true
          call: "vks.list-work-orders"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-work-order
          description: "Create a new work order linked to a guidebook."
          hints:
            readOnly: false
            idempotent: false
          call: "vks.create-work-order"
          with:
            work_order_number: "tools.work_order_number"
            guidebook_id: "tools.guidebook_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-work-order
          description: "Get details for a specific work order."
          hints:
            readOnly: true
            idempotent: true
          call: "vks.get-work-order"
          with:
            work_order_id: "tools.work_order_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-guidebooks
          description: "List all VKS work instruction guidebooks."
          hints:
            readOnly: true
            idempotent: true
          call: "vks.list-guidebooks"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-guidebook
          description: "Get a VKS guidebook with step-by-step work instructions."
          hints:
            readOnly: true
            idempotent: true
          call: "vks.get-guidebook"
          with:
            guidebook_id: "tools.guidebook_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-production-data
          description: "Retrieve production data records with quality metrics and traceability."
          hints:
            readOnly: true
            idempotent: true
          call: "vks.list-production-data"
          with:
            work_order_id: "tools.work_order_id"
          outputParameters:
            - type: object
              mapping: "$."
